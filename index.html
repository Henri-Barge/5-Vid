<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --dark: #0a0a0a;
      --white: #f5f5f0;
    }

    html {
      background: var(--dark);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--dark);
      color: var(--white);
      /* Scroll-Höhe: 2 Sek × 100px = 200px + 100vh Ansicht */
      height: calc(200px + 100vh);
    }

    /* ── Sticky Video-Container ── */
    #sticky-wrap {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    #main-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Scroll-Fortschrittsbalken oben ── */
    #progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background: rgba(255,255,255,0.4);
      z-index: 10;
      transition: width 0.05s linear;
    }

    /* ── Scroll-Hinweis (verschwindet nach erstem Scroll) ── */
    #scroll-hint {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 1;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }

    #scroll-hint.hidden {
      opacity: 0;
    }

    #scroll-hint span {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .scroll-arrow {
      width: 20px;
      height: 20px;
      border-right: 1.5px solid rgba(255,255,255,0.4);
      border-bottom: 1.5px solid rgba(255,255,255,0.4);
      transform: rotate(45deg);
      animation: bounce 1.4s infinite;
    }

    .scroll-arrow:nth-child(2) { animation-delay: 0.2s; }
    .scroll-arrow:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 100% { opacity: 0.2; transform: rotate(45deg) translateY(-4px); }
      50%       { opacity: 0.9; transform: rotate(45deg) translateY(4px); }
    }

    /* ── Call-to-Action Button oben rechts ── */
    #cta-btn {
      position: absolute;
      top: 28px;
      right: 32px;
      z-index: 20;

      display: flex;
      align-items: center;
      gap: 10px;

      background: rgba(255,255,255,0.92);
      color: #111;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-decoration: none;
      padding: 12px 24px;
      border: none;
      cursor: pointer;
      border-radius: 4px;

      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 16px rgba(0,0,0,0.18);
    }

    #cta-btn:hover {
      background: #ffffff;
      transform: scale(1.04);
      box-shadow: 0 6px 28px rgba(0,0,0,0.22);
    }

    #cta-btn:active {
      transform: scale(0.97);
    }

    .phone-icon {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div id="sticky-wrap">

    <div id="progress-bar"></div>

    <video
      id="main-video"
      src="video.mp4"
      muted
      playsinline
      preload="auto"
    ></video>

    <!-- Scroll-Hinweis -->
    <div id="scroll-hint">
      <span>Scroll</span>
      <div class="scroll-arrow"></div>
      <div class="scroll-arrow"></div>
      <div class="scroll-arrow"></div>
    </div>

    <!-- Anruf-Button oben rechts -->
    <a id="cta-btn" href="tel:+49XXXXXXXXXX">
      <svg class="phone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2
                 19.79-19.79 0 0 1-8.63-3.07
                 19.5 19.5 0 0 1-6-6
                 19.79 19.79 0 0 1-3.07-8.67
                 A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72
                 12.84 12.84 0 0 0 .7 2.81
                 2 2 0 0 1-.45 2.11L8.09 9.91
                 a16 16 0 0 0 6 6l1.27-1.27
                 a2 2 0 0 1 2.11-.45
                 12.84 12.84 0 0 0 2.81.7
                 A2 2 0 0 1 22 16.92z"/>
      </svg>
      Jetzt Anrufen
    </a>

  </div>

  <script>
    const video       = document.getElementById('main-video');
    const progressBar = document.getElementById('progress-bar');
    const scrollHint  = document.getElementById('scroll-hint');

    const VIDEO_DURATION = 2;       // Sekunden
    const SCROLL_PX_PER_SEC = 100;  // px Scroll pro Sekunde Video (sehr langsam)
    const TOTAL_SCROLL = VIDEO_DURATION * SCROLL_PX_PER_SEC; // 200px

    let hintHidden = false;
    let ticking = false;

    video.addEventListener('loadedmetadata', () => {
      video.currentTime = 0;
    });

    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          const scrollY = window.scrollY;

          if (!hintHidden && scrollY > 30) {
            scrollHint.classList.add('hidden');
            hintHidden = true;
          }

          const progress   = Math.min(scrollY / TOTAL_SCROLL, 1);
          const targetTime = progress * VIDEO_DURATION;

          video.currentTime = targetTime;
          progressBar.style.width = (progress * 100) + '%';

          ticking = false;
        });
        ticking = true;
      }
    }, { passive: true });
  </script>

</body>
</html>
