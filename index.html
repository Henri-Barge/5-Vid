<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent: #e8ff00;
      --dark: #0a0a0a;
      --white: #f5f5f0;
    }

    html {
      background: var(--dark);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--dark);
      color: var(--white);
      /* Scroll-Höhe: 8 Sek × 400px = 3200px + 100vh Ansicht */
      height: calc(3200px + 100vh);
    }

    /* ── Sticky Video-Container ── */
    #sticky-wrap {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    #main-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Scroll-Fortschrittsbalken oben ── */
    #progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background: var(--accent);
      z-index: 10;
      transition: width 0.05s linear;
    }

    /* ── Scroll-Hinweis (verschwindet nach erstem Scroll) ── */
    #scroll-hint {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 1;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }

    #scroll-hint.hidden {
      opacity: 0;
    }

    #scroll-hint span {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .scroll-arrow {
      width: 20px;
      height: 20px;
      border-right: 1.5px solid rgba(255,255,255,0.4);
      border-bottom: 1.5px solid rgba(255,255,255,0.4);
      transform: rotate(45deg);
      animation: bounce 1.4s infinite;
    }

    .scroll-arrow:nth-child(2) { animation-delay: 0.2s; }
    .scroll-arrow:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 100% { opacity: 0.2; transform: rotate(45deg) translateY(-4px); }
      50%       { opacity: 0.9; transform: rotate(45deg) translateY(4px); }
    }

    /* ── Call-to-Action Button ── */
    #cta-btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;

      display: flex;
      align-items: center;
      gap: 12px;

      background: var(--accent);
      color: var(--dark);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.08em;
      text-decoration: none;
      padding: 14px 36px 12px;
      border: none;
      cursor: pointer;

      /* leicht schiefe Kante */
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);

      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 0 rgba(232,255,0,0);
    }

    #cta-btn:hover {
      background: #fff;
      transform: translateX(-50%) scale(1.04);
      box-shadow: 0 8px 40px rgba(232,255,0,0.35);
    }

    #cta-btn:active {
      transform: translateX(-50%) scale(0.97);
    }

    .phone-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* ── Ende-Overlay (erscheint am Video-Ende) ── */
    #end-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,10,0.55);
      backdrop-filter: blur(2px);
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    #end-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #end-overlay p {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(32px, 5vw, 64px);
      letter-spacing: 0.12em;
      color: var(--white);
      text-align: center;
      line-height: 1.1;
    }
  </style>
</head>
<body>

  <div id="sticky-wrap">

    <div id="progress-bar"></div>

    <video
      id="main-video"
      src="video.mp4"
      muted
      playsinline
      preload="auto"
    ></video>

    <!-- Scroll-Hinweis -->
    <div id="scroll-hint">
      <span>Scroll</span>
      <div class="scroll-arrow"></div>
      <div class="scroll-arrow"></div>
      <div class="scroll-arrow"></div>
    </div>

    <!-- Ende-Overlay -->
    <div id="end-overlay">
      <p>Jetzt Kontakt aufnehmen</p>
    </div>

    <!-- Anruf-Button -->
    <a id="cta-btn" href="tel:+49XXXXXXXXXX">
      <!-- Telefon-Icon als inline SVG -->
      <svg class="phone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2
                 19.79-19.79 0 0 1-8.63-3.07
                 19.5 19.5 0 0 1-6-6
                 19.79 19.79 0 0 1-3.07-8.67
                 A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72
                 12.84 12.84 0 0 0 .7 2.81
                 2 2 0 0 1-.45 2.11L8.09 9.91
                 a16 16 0 0 0 6 6l1.27-1.27
                 a2 2 0 0 1 2.11-.45
                 12.84 12.84 0 0 0 2.81.7
                 A2 2 0 0 1 22 16.92z"/>
      </svg>
      Jetzt Anrufen
    </a>

  </div>

  <script>
    const video       = document.getElementById('main-video');
    const progressBar = document.getElementById('progress-bar');
    const scrollHint  = document.getElementById('scroll-hint');
    const endOverlay  = document.getElementById('end-overlay');

    const VIDEO_DURATION = 2;      // Sekunden
    const SCROLL_PX_PER_SEC = 100; // px Scroll pro Sekunde Video
    const TOTAL_SCROLL = VIDEO_DURATION * SCROLL_PX_PER_SEC; // 3200 px

    let hintHidden = false;

    // Stellt sicher, dass das Video sofort bereit ist
    video.addEventListener('loadedmetadata', () => {
      video.currentTime = 0;
    });

    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;

      // Scroll-Hinweis ausblenden
      if (!hintHidden && scrollY > 30) {
        scrollHint.classList.add('hidden');
        hintHidden = true;
      }

      // Video-Zeit berechnen
      const progress   = Math.min(scrollY / TOTAL_SCROLL, 1);
      const targetTime = progress * VIDEO_DURATION;

      video.currentTime = targetTime;

      // Fortschrittsbalken
      progressBar.style.width = (progress * 100) + '%';

      // Ende-Overlay
      if (progress >= 0.98) {
        endOverlay.classList.add('visible');
      } else {
        endOverlay.classList.remove('visible');
      }
    }, { passive: true });
  </script>

</body>
</html>
